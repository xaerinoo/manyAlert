<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lock Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }
  body { background: #060d20; }

  /* 배경만 fixed */
  .bg-fixed {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 60% 25%, #3a4a8a 0%, #1e2d6b 40%, #0d1a3e 75%, #060d20 100%);
  }
  .bg-fixed::before {
    content: '';
    position: absolute;
    top: -80px; left: -80px;
    width: 55vw; height: 55vw;
    background: radial-gradient(circle, rgba(80,100,190,0.45) 0%, transparent 70%);
    border-radius: 50%;
  }
  .bg-fixed::after {
    content: '';
    position: absolute;
    bottom: 10vh; right: -10vw;
    width: 45vw; height: 45vw;
    background: radial-gradient(circle, rgba(40,60,150,0.3) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* 콘텐츠는 일반 흐름 */
  #screen {
    position: relative;
    z-index: 1;
    width: 100%;
    min-height: 100vh;
  }
  .clock-area {
    padding-top: 18vh;
    text-align: center;
    position: relative;
    z-index: 5;
  }
  .clock-time {
    font-size: min(22vw, 96px);
    font-weight: 200;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
  }
  .clock-date {
    font-size: min(4.5vw, 18px);
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    margin-top: 6px;
    letter-spacing: 0.2px;
  }
  #notifArea {
    position: relative;
    z-index: 6;
    margin-top: 20px;
    padding: 0 12px 80px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .notif-card {
    background: rgba(190,205,230,0.25);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px;
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 11px;
    border: 0.5px solid rgba(255,255,255,0.22);
    opacity: 0;
    transform: translateY(-18px) scale(0.96);
    transition: opacity 0.38s ease, transform 0.38s cubic-bezier(0.34,1.4,0.64,1);
  }
  .notif-card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .notif-card.hiding {
    opacity: 0;
    transform: translateY(-10px) scale(0.95);
    transition: opacity 0.28s ease, transform 0.28s ease;
  }
  .insta-icon {
    width: 40px; height: 40px;
    border-radius: 11px;
    flex-shrink: 0;
    background: linear-gradient(135deg, #ffd600 0%, #ff7200 30%, #e6005a 65%, #9400aa 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .insta-icon svg { width: 23px; height: 23px; }
  .notif-text { flex: 1; min-width: 0; }
  .notif-app-row {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.88);
    display: flex; align-items: center; gap: 5px;
  }
  .notif-dot { color: rgba(255,255,255,0.4); font-size: 10px; }
  .notif-time-label { font-weight: 400; font-size: 11px; color: rgba(255,255,255,0.55); }
  .notif-msg {
    font-size: min(3.4vw, 14px);
    font-weight: 400;
    color: rgba(255,255,255,0.88);
    margin-top: 2px;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .notif-thumb {
    width: 46px; height: 46px;
    border-radius: 11px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .notif-thumb canvas { width: 100%; height: 100%; }
  .home-indicator {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom, 8px), 8px);
    left: 50%; transform: translateX(-50%);
    width: 35vw; max-width: 130px; height: 5px;
    background: rgba(255,255,255,0.4);
    border-radius: 3px;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div id="screen">
  <div class="clock-area">
    <div class="clock-time">18:26</div>
    <div class="clock-date">Tuesday, March 10</div>
  </div>

  <div id="notifArea"></div>
  <div class="home-indicator"></div>
</div>

<script>
const users = [
  "jihoon_travel","soyeon__97","mingyu.lens","hana.wanderer",
  "jaemin_pics","yuna.daily","dohyun_dev","sumin_life","taeil.photo",
  "chaeyoung_j","woojin__k","narae.daily","hyunjin_v","seojun99",
  "minji_moment","ryujin_art","dongwook.j","bora__snap","jiyeon_log",
  "kyungmin_k","sua_photography","heejin.daily","junho_travels",
  "rina_pics","minseo.0","taehwan_v","yoojin_snap","jungwoo.art",
  "eunji_diary","sihyun_k","naeun.daily","jaehyun_log","sujin_photo",
  "sanghyun.v","dawon_life","minjun_k","hayoung_art","jihye_snap"
];

const thumbGrads = [
  ["#89c4f4","#2e6fbd"],["#d7a8e0","#7d3aa0"],["#a8d8a8","#3a7a3a"],
  ["#f0b080","#b05a20"],["#f9e090","#c8890a"],["#f0a0c0","#b03060"],
  ["#80e0d8","#207878"],["#a0c0f0","#2050a0"],["#f0c0a0","#a04020"],
  ["#c0e0a0","#406020"],["#e0a0d0","#703060"],["#a0d0e8","#205878"]
];

const TOTAL_NOTIFS = 15;
let notifCount = 0;
let audioCtx = null;

const likeMessages = [
  u => `${u}님이 회원님의 게시물을 좋아합니다.`,
  u => `${u}님 외 ${2 + Math.floor(Math.random()*8)}명이 회원님의 게시물을 좋아합니다.`,
  u => `${u}님이 회원님의 게시물을 좋아합니다.`,
  u => `${u}님 외 ${1 + Math.floor(Math.random()*5)}명이 회원님의 게시물을 좋아합니다.`,
];

const commentMessages = [
  u => ({ user: u, text: "잘생겼어요...😍" }),
  u => ({ user: u, text: "오~ 드디어 자기 사진 올리네" }),
  u => ({ user: u, text: "그동안 왜 풍경 사진만 올림?! 잘생겼다잉" }),
  u => ({ user: u, text: "와 이거 직접 찍은거야?? 대박" }),
  u => ({ user: u, text: "헐 얼굴 공개ㅋㅋㅋ 잘생겼잖아" }),
  u => ({ user: u, text: "ㅋㅋㅋ 드디어 나왔네 기다렸다" }),
  u => ({ user: u, text: "남자가 이렇게 잘생겨도 됩니까" }),
];

// 15개 알림 타입 시퀀스: 좋아요 9개 + 댓글 6개
const notifSequence = [
  'like','comment','like','like','comment','like','comment',
  'like','like','comment','like','comment','like','like','comment'
];

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

async function playSound() {
  const ctx = getAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended') {
    try { await ctx.resume(); } catch(e) { return; }
  }
  if (ctx.state !== 'running') return;
  const t = ctx.currentTime;

  function tone(freq, start, dur, vol, type='sine') {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, t + start);
    g.gain.setValueAtTime(0.001, t + start);
    g.gain.linearRampToValueAtTime(vol, t + start + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
    o.start(t + start); o.stop(t + start + dur + 0.05);
  }

  tone(1567, 0,    0.12, 0.22, 'triangle');
  tone(2093, 0,    0.09, 0.12, 'sine');
  tone(1318, 0.10, 0.22, 0.18, 'triangle');
  tone(1047, 0.10, 0.30, 0.08, 'sine');
  tone(1318, 0.30, 0.18, 0.06, 'sine');
}

function makeThumbCanvas(g) {
  const c = document.createElement('canvas');
  c.width = 46; c.height = 46;
  const cx = c.getContext('2d');
  const grd = cx.createLinearGradient(0,0,46,46);
  grd.addColorStop(0, g[0]); grd.addColorStop(1, g[1]);
  cx.fillStyle = grd; cx.fillRect(0,0,46,46);
  cx.fillStyle = 'rgba(255,255,255,0.18)';
  cx.beginPath(); cx.arc(15,14,10,0,Math.PI*2); cx.fill();
  cx.fillStyle = 'rgba(255,255,255,0.1)'; cx.fillRect(0,30,46,16);
  return c;
}

async function unlockAudio() {
  const ctx = getAudio();
  if (ctx && ctx.state === 'suspended') await ctx.resume();
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

function scheduleNext() {
  if (notifCount >= TOTAL_NOTIFS) return;
  const delay = 700 + Math.random() * 1300;
  setTimeout(() => { addNotif(); scheduleNext(); }, delay);
}

function addNotif() {
  const area = document.getElementById('notifArea');
  const user = users[Math.floor(Math.random() * users.length)];
  const grad = thumbGrads[Math.floor(Math.random() * thumbGrads.length)];
  const type = notifSequence[notifCount];
  notifCount++;

  playSound();

  let msgText;
  if (type === 'comment') {
    const fn = commentMessages[Math.floor(Math.random() * commentMessages.length)];
    const { user: u, text } = fn(user);
    msgText = `${u}님이 댓글을 남겼습니다: ${text}`;
  } else {
    const fn = likeMessages[Math.floor(Math.random() * likeMessages.length)];
    msgText = fn(user);
  }

  const card = document.createElement('div');
  card.className = 'notif-card';

  const thumb = document.createElement('div');
  thumb.className = 'notif-thumb';
  thumb.appendChild(makeThumbCanvas(grad));

  card.innerHTML = `
    <div class="insta-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="white" stroke-width="2"/>
        <circle cx="12" cy="12" r="4.5" stroke="white" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1.3" fill="white"/>
      </svg>
    </div>
    <div class="notif-text">
      <div class="notif-app-row">
        <span>Instagram</span>
        <span class="notif-dot">·</span>
        <span class="notif-time-label">지금</span>
      </div>
      <div class="notif-msg">${msgText}</div>
    </div>
  `;
  card.appendChild(thumb);

  area.insertBefore(card, area.firstChild);
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
}

setTimeout(() => { addNotif(); scheduleNext(); }, 3000);
</script>
</body>
</html>
